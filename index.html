<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patagonia Secreta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  color:white;
}

header{
  padding:20px;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
}

h1{margin:0}

.search{
  margin-top:15px;
  padding:10px;
  width:100%;
  border-radius:10px;
  border:none;
}

.filtros{
  display:flex;
  gap:10px;
  padding:10px;
  overflow:auto;
}

.filtros button{
  background:#1e293b;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.card h3{
  margin:10px;
}

.card .rating{
  margin:0 10px 10px;
  font-size:14px;
}

.fav{
  position:absolute;
  top:10px;
  right:10px;
  font-size:18px;
}

.detalle{
  display:none;
  padding:15px;
}

.btn{
  background:#0ea5e9;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <h1>Patagonia Secreta</h1>
  <input class="search" placeholder="Buscar destino..." oninput="buscar(this.value)">
</header>

<div class="filtros">
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('rio-negro')">Río Negro</button>
  <button onclick="filtrar('neuquen')">Neuquén</button>
  <button onclick="filtrar('chubut')">Chubut</button>
  <button onclick="filtrar('santa-cruz')">Santa Cruz</button>
  <button onclick="filtrar('tierra-del-fuego')">Tierra del Fuego</button>
</div>

<div id="lista" class="grid"></div>
<div id="detalle" class="detalle"></div>

<script>

// 👉 TUS DATOS (PUEDEN SER COMO LOS TENÍAS)
let PLACES = [
{
  id:1,
  nombre:"Bariloche",
  provincia:"rio-negro",
  img:"https://picsum.photos/400/300?bariloche",
  rating:4.9,
  lat:-41.13,
  lon:-71.3,
  descripcion:"Destino icónico con lagos y nieve.",
  hoteles:["Llao Llao","Edelweiss"],
  restos:["Alto el Fuego"],
  subdestinos:[
    {nombre:"Circuito Chico",info:"Ruta panorámica"},
    {nombre:"Cerro Catedral",info:"Centro de ski"}
  ]
},
{
  id:2,
  nombre:"El Bolsón",
  provincia:"rio-negro",
  img:"https://picsum.photos/400/300?bolson",
  rating:4.8,
  lat:-41.96,
  lon:-71.53,
  descripcion:"Naturaleza y feria artesanal.",
  hoteles:["Cabañas"],
  restos:["Cervecerías"],
  subdestinos:[
    {nombre:"Feria",info:"Artesanos locales"}
  ]
},
{
  id:3,
  nombre:"Ushuaia",
  provincia:"tierra-del-fuego",
  img:"https://picsum.photos/400/300?ushuaia",
  rating:4.9,
  lat:-54.8,
  lon:-68.3,
  descripcion:"Fin del mundo.",
  hoteles:["Arakur"],
  restos:["Volver"],
  subdestinos:[
    {nombre:"Canal Beagle",info:"Excursión en barco"}
  ]
}
];

// 🔥 PARCHE AUTOMÁTICO (EL BUG SOLUCIONADO)
PLACES = PLACES.map(p => ({
  ...p,
  name: p.name || p.nombre,
  region: p.region || p.provincia,
  desc: p.desc || p.descripcion
}));

const lista = document.getElementById("lista");
const detalle = document.getElementById("detalle");

function render(data){
  lista.innerHTML="";
  detalle.style.display="none";
  lista.style.display="grid";

  data.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <span class="fav">❤️</span>
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p class="rating">⭐ ${p.rating}</p>
    `;

    div.onclick=()=>ver(p);

    lista.appendChild(div);
  });
}

function ver(p){
  lista.style.display="none";
  detalle.style.display="block";

  detalle.innerHTML=`
    <button class="btn" onclick="volver()">⬅ Volver</button>
    <img src="${p.img}" style="width:100%;border-radius:10px;">
    <h2>${p.name}</h2>
    <p>${p.desc}</p>

    <h3>📍 Subdestinos</h3>
    ${p.subdestinos.map(s=>`<p><b>${s.nombre}:</b> ${s.info}</p>`).join("")}

    <h3>🏨 Hoteles</h3>
    ${p.hoteles.map(h=>`<p>${h}</p>`).join("")}

    <h3>🍽 Restaurantes</h3>
    ${p.restos.map(r=>`<p>${r}</p>`).join("")}

    <h3>🌡 Clima</h3>
    <p id="clima">Cargando...</p>
  `;

  cargarClima(p.lat,p.lon);
}

function volver(){
  render(PLACES);
}

function filtrar(region){
  if(region==="todos") return render(PLACES);
  render(PLACES.filter(p=>p.region===region));
}

function buscar(texto){
  render(PLACES.filter(p=>p.name.toLowerCase().includes(texto.toLowerCase())));
}

async function cargarClima(lat,lon){
  const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
  const data=await res.json();
  document.getElementById("clima").innerText = data.current_weather.temperature+"°C";
}

render(PLACES);

</script>

</body>
</html>
