<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Turismo Argentina</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#111;
  color:#fff;
}

/* TABS */
.tabs{
  display:flex;
  overflow:auto;
  background:#000;
}
.tab{
  padding:12px 15px;
  cursor:pointer;
}
.tab.active{
  background:red;
}

/* CONTENEDOR */
#places-container{
  padding:10px;
}

/* TARJETAS */
.place-card{
  background:#222;
  margin:10px 0;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}
.place-card:hover{
  transform:scale(1.02);
}

.place-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.place-info{
  padding:10px;
}

/* DETALLE */
#detail-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  z-index:999;
}

#detail-overlay.open{
  display:block;
}

#detail-hero{
  height:250px;
  background-size:cover;
  background-position:center;
}

#detail-content{
  padding:15px;
}

button{
  padding:10px;
  margin:10px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- PROVINCIAS -->
<div class="tabs">
  <div class="tab active" onclick="filterTab('todas',this)">Todas</div>
  <div class="tab" onclick="filterTab('rio-negro',this)">Río Negro</div>
  <div class="tab" onclick="filterTab('neuquen',this)">Neuquén</div>
</div>

<!-- CONTENIDO -->
<div id="places-container"></div>

<!-- DETALLE -->
<div id="detail-overlay">
  <button onclick="cerrarDetalle()">Volver</button>
  <div id="detail-hero"></div>
  <div id="detail-content">
    <h2 id="detail-name"></h2>
    <p id="detail-sub"></p>
    <div id="detail-body"></div>
  </div>
</div>

<script>

/* DATOS */
const PLACES = [
  {
    id:1,
    name:"Bariloche",
    region:"rio-negro",
    regionName:"Río Negro",
    img:"https://picsum.photos/400/300?1",
    desc:"Ciudad turística con montañas, lagos y nieve."
  },
  {
    id:2,
    name:"Las Grutas",
    region:"rio-negro",
    regionName:"Río Negro",
    img:"https://picsum.photos/400/300?2",
    desc:"Playas con aguas cálidas en Argentina."
  },
  {
    id:3,
    name:"San Martín de los Andes",
    region:"neuquen",
    regionName:"Neuquén",
    img:"https://picsum.photos/400/300?3",
    desc:"Naturaleza increíble, montañas y lagos."
  }
];

/* FILTRAR PROVINCIA */
function filterTab(region, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

  let filtrados = (region === 'todas')
    ? PLACES
    : PLACES.filter(p => p.region === region);

  renderPlaces(filtrados);
}

/* MOSTRAR LUGARES */
function renderPlaces(lista){
  const container = document.getElementById("places-container");
  container.innerHTML = "";

  lista.forEach(p => {
    container.innerHTML += `
      <div class="place-card" onclick="abrirLugar(${p.id})">
        <img src="${p.img}" onerror="this.src='https://picsum.photos/400/300'">
        <div class="place-info">
          <h3>${p.name}</h3>
          <p>${p.regionName}</p>
        </div>
      </div>
    `;
  });
}

/* ABRIR DETALLE */
function abrirLugar(id){
  const lugar = PLACES.find(p => p.id === id);

  document.getElementById("detail-name").innerText = lugar.name;
  document.getElementById("detail-sub").innerText = lugar.regionName;
  document.getElementById("detail-hero").style.backgroundImage = `url(${lugar.img})`;
  document.getElementById("detail-body").innerHTML = `<p>${lugar.desc}</p>`;

  document.getElementById("detail-overlay").classList.add("open");
}

/* CERRAR */
function cerrarDetalle(){
  document.getElementById("detail-overlay").classList.remove("open");
}

/* INICIO */
document.addEventListener("DOMContentLoaded", () => {
  renderPlaces(PLACES);
});

</script>

</body>
</html>
