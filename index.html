<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patagonia Secreta</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
  background:linear-gradient(90deg,#0ea5e9,#22c55e);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}

.place-card{
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}
.place-card:hover{
  transform:scale(1.03);
}

.place-card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.place-card h3{
  margin:10px;
}

.detail{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:none;
  overflow:auto;
}

.detail img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.detail-content{
  padding:15px;
}

.back{
  position:absolute;
  top:10px;
  left:10px;
  background:black;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🌎 Patagonia Secreta</header>

<div id="list" class="grid"></div>

<div id="detail" class="detail">
  <div class="back" onclick="closeDetail()">⬅ Volver</div>
  <img id="detailImg">
  <div class="detail-content">
    <h2 id="detailTitle"></h2>
    <p id="detailDesc"></p>
    <p><b>Cómo llegar:</b> <span id="detailLlegar"></span></p>
    <p><b>Qué hacer:</b> <span id="detailHacer"></span></p>
    <p><b>Hoteles:</b> <span id="detailHoteles"></span></p>
  </div>
</div>

<script>
const lugares = [
{ id:1, nombre:"Bariloche", provincia:"rio-negro", img:"https://picsum.photos/400/300?bariloche1", descripcion:"Destino icónico con lagos y nieve.", llegar:"Vuelo directo o Ruta 40.", hacer:"Esquí, Circuito Chico, trekking.", hoteles:"Llao Llao, Edelweiss, hosterías." },
{ id:2, nombre:"El Bolsón", provincia:"rio-negro", img:"https://picsum.photos/400/300?bolson", descripcion:"Pueblo hippie rodeado de montañas.", llegar:"Ruta 40 desde Bariloche.", hacer:"Feria artesanal, cervecerías, trekking.", hoteles:"Cabañas y hostels." },
{ id:3, nombre:"Las Grutas", provincia:"rio-negro", img:"https://picsum.photos/400/300?grutas", descripcion:"Playas cálidas únicas.", llegar:"Ruta 3 desde Viedma.", hacer:"Playa, buceo, excursiones.", hoteles:"Hoteles frente al mar." },
{ id:4, nombre:"San Martín de los Andes", provincia:"neuquen", img:"https://picsum.photos/400/300?andes1", descripcion:"Naturaleza y tranquilidad.", llegar:"Ruta de los 7 Lagos.", hacer:"Kayak, trekking, pesca.", hoteles:"Cabañas y hoteles boutique." },
{ id:5, nombre:"Villa La Angostura", provincia:"neuquen", img:"https://picsum.photos/400/300?angostura", descripcion:"Bosques y lagos increíbles.", llegar:"Ruta 40 desde Bariloche.", hacer:"Bosque Arrayanes, senderismo.", hoteles:"Hoteles premium y cabañas." },
{ id:6, nombre:"Puerto Madryn", provincia:"chubut", img:"https://picsum.photos/400/300?madryn1", descripcion:"Avistaje de ballenas.", llegar:"Ruta 3 o avión.", hacer:"Ballenas, snorkel con lobos.", hoteles:"Hoteles frente al mar." },
{ id:7, nombre:"Esquel", provincia:"chubut", img:"https://picsum.photos/400/300?esquel", descripcion:"Puerta a la Patagonia profunda.", llegar:"Ruta 40.", hacer:"La Trochita, Parque Los Alerces.", hoteles:"Hosterías y cabañas." },
{ id:8, nombre:"El Calafate", provincia:"santa-cruz", img:"https://picsum.photos/400/300?calafate1", descripcion:"Glaciar Perito Moreno.", llegar:"Vuelo o ruta.", hacer:"Glaciares, trekking.", hoteles:"Hoteles turísticos." },
{ id:9, nombre:"El Chaltén", provincia:"santa-cruz", img:"https://picsum.photos/400/300?chalten", descripcion:"Capital del trekking.", llegar:"Ruta desde El Calafate.", hacer:"Laguna de los Tres, Fitz Roy.", hoteles:"Hostels y lodges." },
{ id:10, nombre:"Ushuaia", provincia:"tierra-del-fuego", img:"https://picsum.photos/400/300?ushuaia", descripcion:"La ciudad más austral del mundo.", llegar:"Vuelo directo.", hacer:"Canal Beagle, nieve, trekking.", hoteles:"Hoteles turísticos." },
{ id:11, nombre:"Tolhuin", provincia:"tierra-del-fuego", img:"https://picsum.photos/400/300?tolhuin", descripcion:"Corazón de la isla.", llegar:"Ruta entre Ushuaia y Río Grande.", hacer:"Lago Fagnano, naturaleza.", hoteles:"Cabañas." }
];

function render(){
  const list = document.getElementById("list");
  list.innerHTML = lugares.map(p => `
    <div class="place-card" data-id="${p.id}">
      <img src="${p.img}">
      <h3>${p.nombre}</h3>
    </div>
  `).join("");
}

document.addEventListener("click", function(e){
  const card = e.target.closest(".place-card");
  if(card){
    const id = parseInt(card.dataset.id);
    openDetail(id);
  }
});

function openDetail(id){
  const p = lugares.find(x => x.id === id);
  document.getElementById("detail").style.display="block";
  document.getElementById("detailImg").src = p.img;
  document.getElementById("detailTitle").innerText = p.nombre;
  document.getElementById("detailDesc").innerText = p.descripcion;
  document.getElementById("detailLlegar").innerText = p.llegar;
  document.getElementById("detailHacer").innerText = p.hacer;
  document.getElementById("detailHoteles").innerText = p.hoteles;
}

function closeDetail(){
  document.getElementById("detail").style.display="none";
}

render();
</script>

</body>
</html>
